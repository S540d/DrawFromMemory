name: CI/CD - Automated Quality Checks

on:
  push:
    branches: [main, develop, testing]
  pull_request:
    branches: [main, develop]

# Security: Explicitly set minimal permissions
permissions:
  contents: read

jobs:
  # ============================================================================
  # JOB 1: Code Quality & Linting
  # ============================================================================
  code-quality:
    name: 🔍 Code Quality & Linting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check for console.log in production code
        run: |
          echo "Checking for console.log statements..."
          if grep -r "console\.log\|console\.debug" app/ components/ --exclude-dir=node_modules --exclude-dir=.git 2>/dev/null; then
            echo "❌ ERROR: Found console.log/debug in production code!"
            exit 1
          else
            echo "✅ No console.log found"
          fi

      - name: Check for Web APIs without Platform check
        run: |
          echo "Checking for unsafe Web API usage..."
          # Check for window.* without Platform.OS check
          if grep -r "window\." app/ components/ --exclude-dir=node_modules 2>/dev/null | grep -v "Platform.OS === 'web'" | grep -v "// platform-safe"; then
            echo "❌ ERROR: Found window.* without Platform.OS check!"
            echo "Add 'Platform.OS === web' check or // platform-safe comment"
            exit 1
          fi

          # Check for localStorage without Platform.OS check
          if grep -r "localStorage\." app/ components/ --exclude-dir=node_modules 2>/dev/null | grep -v "Platform.OS === 'web'" | grep -v "// platform-safe"; then
            echo "❌ ERROR: Found localStorage without Platform.OS check!"
            echo "Use AsyncStorage for mobile or add Platform.OS check"
            exit 1
          fi

          echo "✅ All Web APIs are platform-safe"

      - name: Check for direct AsyncStorage imports
        run: |
          echo "Checking AsyncStorage usage..."
          # Ensure AsyncStorage is used for mobile, not localStorage
          if grep -r "@react-native-async-storage/async-storage" app/ components/ --exclude-dir=node_modules 2>/dev/null; then
            echo "✅ AsyncStorage is properly used"
          fi

      - name: ESLint (React Hooks Rules)
        run: npm run lint

      - name: Validate SVG element counts
        run: npm run validate:svg-counts

      - name: TypeScript Type Check
        run: npx tsc --noEmit || true

  # ============================================================================
  # JOB 2: Unit Tests & Coverage
  # ============================================================================
  test:
    name: 🧪 Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ============================================================================
  # JOB 3: Cross-Platform Build Tests
  # ============================================================================
  build-web:
    name: 🌐 Build Web
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Web
        run: npm run build:web

      - name: Check bundle size
        run: |
          if [ -d "dist" ]; then
            SIZE=$(du -sh dist | cut -f1)
            echo "📦 Bundle size: $SIZE"
          fi

      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: web-build
          path: dist/
          retention-days: 7

  # ============================================================================
  # JOB 4: Platform Compatibility Checks (Expo Managed)
  # ============================================================================
  platform-checks:
    name: 🔧 Platform Compatibility
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          echo "Checking version numbers..."

          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          APP_JSON_VERSION=$(node -p "require('./app.json').expo.version")

          echo "package.json: $PACKAGE_VERSION"
          echo "app.json: $APP_JSON_VERSION"

          if [ "$PACKAGE_VERSION" != "$APP_JSON_VERSION" ]; then
            echo "❌ ERROR: Version mismatch!"
            echo "All versions must be identical."
            exit 1
          fi

          echo "✅ All versions are consistent"

  # ============================================================================
  # JOB 5: Security & Dependencies
  # ============================================================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

      - name: Check for sensitive data
        run: |
          echo "Checking for sensitive data..."

          # Check for potential secrets
          if grep -ri "password\s*=\|api_key\s*=\|secret\s*=" . --exclude-dir=node_modules --exclude-dir=.git --exclude="*.md" 2>/dev/null; then
            echo "⚠️  WARNING: Potential sensitive data found!"
          else
            echo "✅ No sensitive data found"
          fi

  # ============================================================================
  # JOB 5: Docs Privacy Check
  # ============================================================================
  docs-privacy:
    name: 🔐 Docs Privacy Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check .gitignore covers docs/private/
        run: |
          if ! grep -q "docs/private/" .gitignore; then
            echo "❌ ERROR: docs/private/ is not in .gitignore!"
            exit 1
          fi
          echo "✅ docs/private/ is gitignored"

      - name: Check no private docs are committed
        run: |
          PRIVATE_FILES=$(git ls-files docs/private/ 2>/dev/null)
          if [ -n "$PRIVATE_FILES" ]; then
            echo "❌ ERROR: Private docs found in repository:"
            echo "$PRIVATE_FILES"
            exit 1
          fi
          echo "✅ No private docs committed"

      - name: Check known sensitive filenames not in repo
        run: |
          SENSITIVE=(
            "DEPLOYMENT_GUIDE.md"
            "PLAY_STORE_METADATA.md"
            "PLAY_STORE_METADATA_EN.md"
            "STORE_ASSETS_TODO.md"
            "BILDERPOOL.md"
            "IMAGE_GUIDELINES.md"
          )
          FOUND=0
          for f in "${SENSITIVE[@]}"; do
            if git ls-files | grep -q "$f"; then
              echo "❌ WARNING: Sensitive file committed: $f"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 0 ]; then
            echo "✅ No sensitive filenames found"
          else
            exit 1
          fi

  # ============================================================================
  # JOB 6: Keystore & Credential Scan
  # ============================================================================
  keystore-secrets:
    name: 🔑 Keystore & Credential Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check no keystore files are committed
        run: |
          FOUND=$(git ls-files | grep -E "\.(keystore|jks)$" || true)
          if [ -n "$FOUND" ]; then
            echo "❌ ERROR: Keystore file committed to repository!"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ No keystore files found"

      - name: Check .gitignore covers keystore patterns
        run: |
          if ! grep -q "\.keystore" .gitignore || ! grep -q "\.jks" .gitignore; then
            echo "❌ ERROR: .gitignore does not cover *.keystore / *.jks!"
            exit 1
          fi
          echo "✅ Keystore patterns are gitignored"

      - name: Scan for hardcoded keystore passwords
        run: |
          if grep -rEi "keystorePassword[[:space:]]*=[[:space:]]*[^[:space:]]|keyPassword[[:space:]]*=[[:space:]]*[^[:space:]]|storePassword[[:space:]]*=[[:space:]]*[^[:space:]]" . \
              --exclude-dir=node_modules --exclude-dir=.git \
              --exclude="*.md" --exclude="*.example" -l 2>/dev/null; then
            echo "❌ ERROR: Hardcoded keystore password found!"
            echo "Use environment variables or EAS Secrets instead."
            exit 1
          fi
          echo "✅ No hardcoded keystore passwords found"

      - name: Scan for base64-encoded keystore
        run: |
          if grep -rEl "MIIF[A-Za-z0-9+/]{50,}" . \
              --exclude-dir=node_modules --exclude-dir=.git \
              --exclude="*.md" 2>/dev/null; then
            echo "❌ WARNING: Possible base64-encoded keystore content found!"
            exit 1
          fi
          echo "✅ No encoded keystore content found"

  # ============================================================================
  # JOB 7: Release Readiness Report
  # ============================================================================
  release-checklist:
    name: 📋 Release Readiness Report
    runs-on: ubuntu-latest
    needs: [code-quality, test, build-web, platform-checks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Generate Release Report
        run: |
          echo "# 🚀 Release Readiness Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Automated Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code Quality & Linting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Web Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Platform Compatibility" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Version Consistency" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📝 Manual Checks Required" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Before deploying, manually verify:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Test app with Expo Go on physical device" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Test all features in web browser" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Test game mechanics and drawing" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Settings persist correctly" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Release notes written" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $(node -p "require('./package.json').version")" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
