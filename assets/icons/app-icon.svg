<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Hintergrund-Kreis (App-Brand-Farbe, konsistent mit Splash Screen/app.json primaryColor) -->
  <circle cx="512" cy="512" r="480" fill="#60D5FA"/>

  <!-- Gezeichneter Stern (Mali malt gerade) — Stilguide §2: dicke Akzentlinie -->
  <polygon points="740,360 758,410 812,412 768,444 784,496 740,464 696,496 712,444 668,412 722,410"
    fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sparkles -->
  <circle cx="800" cy="300" r="10" fill="#FFFFFF"/>
  <circle cx="680" cy="520" r="7" fill="#FFFFFF"/>
  <circle cx="640" cy="330" r="12" fill="#FFFFFF"/>

  <!-- Mascot "Mali" — Chamäleon, Farben/Linienstärken gemäß docs/ILLUSTRATION_STYLEGUIDE.md -->
  <g transform="translate(150, 260) scale(6.2)">
    <!-- Schwanz -->
    <path d="M28 70 C 10 70, 8 50, 22 46 C 12 44, 12 30, 24 32"
      stroke="#44CF6C" stroke-width="7" stroke-linecap="round" fill="none"/>
    <!-- Füße -->
    <ellipse cx="38" cy="88" rx="8" ry="5" fill="#44CF6C"/>
    <ellipse cx="62" cy="88" rx="8" ry="5" fill="#44CF6C"/>
    <!-- Körper -->
    <ellipse cx="50" cy="64" rx="26" ry="22" fill="#44CF6C"/>
    <!-- Kopf -->
    <circle cx="50" cy="36" r="19" fill="#44CF6C"/>
    <!-- Augenhöcker -->
    <circle cx="39" cy="22" r="9" fill="#44CF6C"/>
    <circle cx="61" cy="22" r="9" fill="#44CF6C"/>
    <!-- Augen -->
    <circle cx="39" cy="20" r="5.5" fill="#FFFFFF"/>
    <circle cx="61" cy="20" r="5.5" fill="#FFFFFF"/>
    <circle cx="40" cy="19" r="2.6" fill="#000000"/>
    <circle cx="62" cy="19" r="2.6" fill="#000000"/>
    <!-- Wangen-Blush -->
    <circle cx="37" cy="40" r="4" fill="#FF69B4" opacity="0.55"/>
    <circle cx="63" cy="40" r="4" fill="#FF69B4" opacity="0.55"/>
    <!-- Mund (freudig) -->
    <path d="M40 44 Q50 52 60 44" stroke="#000000" stroke-width="2" stroke-linecap="round" fill="none"/>
