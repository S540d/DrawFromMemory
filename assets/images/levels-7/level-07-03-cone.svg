<svg width="200" height="240" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Apex point at top -->
  <circle cx="100" cy="30" r="2" fill="#000000"/>

  <!-- Left side line to base -->
  <line x1="100" y1="30" x2="50" y2="180" stroke="#000000" stroke-width="2" stroke-linecap="round"/>

  <!-- Right side line to base -->
  <line x1="100" y1="30" x2="150" y2="180" stroke="#000000" stroke-width="2" stroke-linecap="round"/>

  <!-- Base ellipse -->
  <ellipse cx="100" cy="180" rx="55" ry="25" fill="#FF6B6B" stroke="#000000" stroke-width="2"/>

  <!-- Hidden part of base (dashed) -->
  <path d="M 50 180 A 55 25 0 0 0 150 180" stroke="#000000" stroke-width="1" stroke-dasharray="3,2" fill="none"/>

  <!-- Front face of cone (triangle) -->
  <polygon points="100,30 50,180 150,180" fill="#FF8C8C" stroke="#000000" stroke-width="2"/>

  <!-- Highlight on cone -->
  <path d="M 100 50 Q 90 100 85 160" stroke="#FFFFFF" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Center line on base for depth -->
  <line x1="50" y1="180" x2="150" y2="180" stroke="#000000" stroke-width="1" opacity="0.5"/>
</svg>
