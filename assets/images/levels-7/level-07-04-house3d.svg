<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Front wall -->
  <rect x="50" y="90" width="90" height="100" fill="#E74C3C" stroke="#000000" stroke-width="2"/>

  <!-- Left side wall -->
  <polygon points="50,90 70,70 70,170 50,190" fill="#C0392B" stroke="#000000" stroke-width="2"/>

  <!-- Roof front -->
  <polygon points="50,90 100,40 140,90" fill="#8B4513" stroke="#000000" stroke-width="2"/>

  <!-- Roof side (depth) -->
  <polygon points="100,40 115,55 130,60 140,90" fill="#654321" stroke="#000000" stroke-width="2"/>

  <!-- Door -->
  <rect x="75" y="130" width="30" height="50" fill="#654321" stroke="#000000" stroke-width="2"/>

  <!-- Window front -->
  <rect x="60" y="105" width="20" height="20" fill="#87CEEB" stroke="#000000" stroke-width="1.5"/>

  <!-- Window side wall -->
  <rect x="65" y="100" width="15" height="18" fill="#87CEEB" stroke="#000000" stroke-width="1.5"/>

  <!-- Door handle -->
  <circle cx="103" cy="155" r="2" fill="#FFD700"/>

  <!-- Connecting perspective lines -->
  <line x1="100" y1="40" x2="70" y2="70" stroke="#000000" stroke-width="1"/>
  <line x1="140" y1="90" x2="70" y2="170" stroke="#000000" stroke-width="1"/>
  <line x1="115" y1="55" x2="100" y2="40" stroke="#000000" stroke-width="1.5"/>

  <!-- Ground line -->
  <line x1="50" y1="190" x2="160" y2="190" stroke="#000000" stroke-width="2"/>
</svg>
