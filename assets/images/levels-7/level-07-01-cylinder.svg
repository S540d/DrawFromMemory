<svg width="200" height="240" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Top ellipse (opening) -->
  <ellipse cx="100" cy="40" rx="45" ry="20" fill="#FFD700" stroke="#000000" stroke-width="2"/>

  <!-- Left vertical line -->
  <line x1="55" y1="40" x2="50" y2="180" stroke="#000000" stroke-width="2" stroke-linecap="round"/>

  <!-- Right vertical line -->
  <line x1="145" y1="40" x2="150" y2="180" stroke="#000000" stroke-width="2" stroke-linecap="round"/>

  <!-- Bottom ellipse (base) -->
  <ellipse cx="100" cy="180" rx="50" ry="25" fill="#3498DB" stroke="#000000" stroke-width="2"/>

  <!-- Hidden part of bottom ellipse (dashed) -->
  <path d="M 55 180 A 50 25 0 0 0 145 180" stroke="#000000" stroke-width="1" stroke-dasharray="3,2" fill="none"/>

  <!-- Side shading (parallelogram suggestion) -->
  <polygon points="55,40 145,40 150,180 50,180" fill="#87CEEB" opacity="0.2" stroke="none"/>

  <!-- Highlight on top -->
  <ellipse cx="80" cy="35" rx="15" ry="8" fill="#FFFFFF" opacity="0.5"/>
</svg>
