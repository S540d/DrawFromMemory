<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Front face (square) -->
  <rect x="50" y="80" width="60" height="60" fill="#E74C3C" stroke="#000000" stroke-width="2"/>

  <!-- Top face (parallelogram) -->
  <polygon points="50,80 70,60 130,60 110,80" fill="#FFD700" stroke="#000000" stroke-width="2"/>

  <!-- Right face (parallelogram) -->
  <polygon points="110,80 130,60 130,120 110,140" fill="#8B4513" stroke="#000000" stroke-width="2"/>

  <!-- Edge lines for definition -->
  <line x1="110" y1="80" x2="130" y2="60" stroke="#000000" stroke-width="1.5"/>
  <line x1="110" y1="140" x2="130" y2="120" stroke="#000000" stroke-width="1.5"/>
</svg>
