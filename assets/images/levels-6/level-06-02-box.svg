<svg width="200" height="220" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
  <!-- Front face -->
  <rect x="40" y="90" width="80" height="80" fill="#9B59B6" stroke="#000000" stroke-width="2"/>

  <!-- Top face -->
  <polygon points="40,90 60,70 140,70 120,90" fill="#E74C3C" stroke="#000000" stroke-width="2"/>

  <!-- Right side face -->
  <polygon points="120,90 140,70 140,150 120,170" fill="#CD853F" stroke="#000000" stroke-width="2"/>

  <!-- Lid edge -->
  <polygon points="60,70 80,50 140,50 140,70" fill="#FFD700" stroke="#000000" stroke-width="1.5"/>

  <!-- Connecting lines -->
  <line x1="120" y1="90" x2="140" y2="70" stroke="#000000" stroke-width="1.5"/>
</svg>
